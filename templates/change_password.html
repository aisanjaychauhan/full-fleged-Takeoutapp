<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Takeout Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #181b21;
            --bg-input: #22262f;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
            --border: #2a2f3a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-box {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .header h2 {
            font-weight: 600;
            font-size: 1.25rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
        }

        .header a:hover {
            color: var(--text-main);
            background: var(--bg-input);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .error {
            color: var(--error);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="header">
            <h2>Change Password</h2>
            <a href="/">Cancel</a>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/change_password" class="form-group">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label>Current Password</label>
                <input type="password" name="current_password" required style="width:100%; margin-top:0.25rem;">
            </div>
            <div>
                <label>New Password</label>
                <input type="password" name="new_password" required minlength="4"
                    style="width:100%; margin-top:0.25rem;">
            </div>
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
</body>

</html>
