<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Takeout Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('takeout_theme') || 'midnight';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #181b21;
            --bg-input: #22262f;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
            --border: #2a2f3a;
        }

        [data-theme="light"] {
            --bg-dark: #f8fafc;
            --bg-panel: #ffffff;
            --bg-input: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #dc2626;
            --border: #e2e8f0;
        }

        [data-theme="light"] h1 {
            color: #0f172a !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: url('/static/backdrop.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        [data-theme="light"] body {
            background-image: none;
        }

        .login-box {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.85rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-outline:hover {
            background: var(--bg-input);
        }

        .error {
            color: var(--error);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div
            style="text-align:center; margin-bottom:1.5rem; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:0.5rem;">
            <img src="/static/logo.png" alt="TO THE NEW Logo"
                style="height:56px; width:auto; max-width:160px; object-fit:contain;"
                onerror="this.style.display='none'">
            <h1
                style="font-size:1.8rem; font-weight:700; color:var(--text-main); margin:0; letter-spacing:1px; white-space:nowrap;">
                TO THE NEW</h1>
        </div>
        <h2>Authentication</h2>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login" class="form-group">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label>Username</label>
                <input type="text" name="username" required style="width:100%; margin-top:0.25rem;">
            </div>
            <div>
                <label>Password</label>
                <input type="password" name="password" required style="width:100%; margin-top:0.25rem;">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.82rem; color:var(--text-muted);">
            Forgot your password? Contact your administrator.
        </p>

        <div style="display:flex; align-items:center; margin: 1.5rem 0;">
            <div style="flex:1; height:1px; background:var(--border);"></div>
            <div style="padding:0 1rem; font-size:0.85rem; color:var(--text-muted);">OR</div>
            <div style="flex:1; height:1px; background:var(--border);"></div>
        </div>

        <a href="/login/google" class="btn btn-outline"
            style="display:flex; width:100%; justify-content:center; align-items:center; gap:0.5rem; text-decoration:none;">
            <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
                <path d="M1 1h22v22H1z" fill="none" />
            </svg>
            Continue with Google
        </a>
    </div>
</body>

</html>
